
version: "1"
services:
  - type: web
    name: HealUp
    runtime: static
    repo: https://github.com/habiba-shoukry/HealUp
    branch: anu-backend
    rootDir: frontend
    buildCommand: npm install; npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: HealUp-backend
    runtime: docker 
    repo: https://github.com/habiba-shoukry/HealUp
    branch: anu-backend
    rootDir: backend
    dockerContext: . 
    dockerfilePath: Dockerfile 
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_USER_DB_URL
        sync: false
      - key: MONGO_ACTIVITY_DB_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
    healthCheckPath: /api/health